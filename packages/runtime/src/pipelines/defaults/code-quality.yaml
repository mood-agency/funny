# Built-in code-quality pipeline.
#
# End-to-end workflow: commit → review-loop → tests → optional approval gate
# → push → PR → notify. Composes the three smaller pipelines via
# `pipeline:` references.
#
# Replaces packages/runtime/src/pipelines/code-quality.pipeline.ts.
#
# A note on `pipeline: { name: ... }`: the YAML loader resolves these
# against the same `defaults/` directory plus any user override. So if you
# place `.funny/pipelines/commit.yaml` in your repo, it wins over the
# built-in commit and code-quality picks up your override automatically.

name: code-quality
description: commit → review → tests → push → PR

inputs:
  commit_message: { type: string, required: true }
  branch: { type: string, required: true }
  base_branch: { type: string, default: main }
  test_command: { type: string }
  commit_sha: { type: string, default: HEAD }

nodes:
  # ── 1. Commit (with pre-commit hook auto-fix) ─────────
  - id: commit
    pipeline:
      name: commit
      inputs:
        commit_message: "{{commit_message}}"

  # ── 2. Code review (review → fix loop) ────────────────
  - id: review
    depends_on: [commit]
    pipeline:
      name: code-review
      inputs:
        commit_sha: "{{commit_sha}}"

  # ── 3. Tests with auto-fix ────────────────────────────
  - id: test
    depends_on: [review]
    when: '$exists(test_command) and test_command != ""'
    pipeline:
      name: pre-push
      inputs:
        test_command: "{{test_command}}"

  # ── 4. Push to remote ─────────────────────────────────
  - id: push
    depends_on: [test]
    git_push:
      branch: "{{branch}}"
      set_upstream: true
    retry:
      max_attempts: 2
      before_retry:
        prompt: |
          `git push` failed with:

          ```
          {{LAST_ERROR}}
          ```

          Diagnose and fix the issue (rebase, conflicts, etc.). Do not push
          again — the engine will retry automatically.

  # ── 5. Create PR (non-fatal if it fails) ──────────────
  - id: pr
    depends_on: [push]
    on_error: continue
    create_pr:
      title: "{{commit_message}}"
      base: "{{base_branch}}"

  # ── 6. Notify completion ──────────────────────────────
  - id: done
    depends_on: [pr]
    notify:
      message: "Pipeline complete. Branch {{branch}} pushed."
      level: info

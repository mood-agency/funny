# Sentrux architectural rules for the funny monorepo.
#
# Codifies the package layering documented in CLAUDE.md:
#   shared   — leaf types
#   core     — pure logic, depends only on shared
#   runtime  — agent/git execution, depends on core + shared
#   server   — HTTP/auth/db, depends on core + shared
#   client   — React SPA, depends on shared (types) only

# Boundary rules — `from` must NOT import `to`.
# We rely solely on boundaries (no [[layers]]) so Sentrux only checks what we
# explicitly forbid, instead of enforcing strict ordering.

[[boundaries]]
from = "packages/shared/**"
to = "packages/core/**"
reason = "shared is the leaf types module; it must not depend on core."

[[boundaries]]
from = "packages/core/**"
to = "packages/runtime/**"
reason = "core is pure logic; runtime depends on core, not the other way around."

[[boundaries]]
from = "packages/client/**"
to = "packages/server/**"
reason = "client talks to the server over HTTP, never via direct module imports."

# Quality floor — locked just above current worst values so regressions
# are caught while the existing offenders keep building.
# no_god_files left off — ReviewPane still has fan-out 48 (target 15).
# After ChangesToolbar + CommitDraftPanel + the existing tab/hook splits,
# the next big lever is extracting the virtualized file list (~564 lines).
# That carve takes the shared UI primitives (Tooltip, Button, DropdownMenu,
# TriCheckbox, FileExtensionIcon, etc.) with it and should drop fan-out
# below the threshold. See .claude/plans/reviewpane-split.md.
# Quality floor — locked just above current worst values so regressions
# are caught while the existing offenders keep building.
# no_god_files left off until ALL violators are below threshold 15.
# After ReviewPane Step 4 + import cleanup: ReviewPane 50 → 36, but 23 more
# files (App.tsx 39, runtime/app.ts 37, Sidebar.tsx 27, …) still exceed.
# See .claude/plans/reviewpane-split.md.
[constraints]
min_modularity = 0.6
min_redundancy = 0.18
max_file_lines = 4000
max_fn_lines = 1500

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests (shared)
        run: bun run --cwd packages/shared test

      - name: Run tests (core)
        run: bun run --cwd packages/core test

      - name: Run tests (agent)
        run: bun run --cwd packages/agent test

      - name: Run tests (runtime)
        run: bun run --cwd packages/runtime test

      - name: Run tests (client)
        run: bun run --cwd packages/client test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  chrome-extension:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Chrome extension
        run: bun run --cwd packages/chrome-extension build

      - name: Package Chrome extension
        run: bun run --cwd packages/chrome-extension package

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: packages/chrome-extension/funny-annotator-*.zip
